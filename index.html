<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traverse Recoverer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #1a1c1e;
    --surface: #23262a;
    --surface2: #2c3036;
    --border: #383d44;
    --text: #e8eaed;
    --muted: #8a9099;
    --accent: #4fc3f7;
    --green: #66bb6a;
    --orange: #ffa726;
    --red: #ef5350;
    --purple: #ab47bc;
    --line-bs: #ffa726;
    --line-fs: #4fc3f7;
    --point-default: #8a9099;
    --point-setup: #66bb6a;
    --point-bs: #ffa726;
    --font-mono: 'Courier New', monospace;
}

body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.04em; color: var(--accent); }
#statusBar { font-size: 13px; color: var(--muted); flex: 1; }
#statusBar span { color: var(--accent); font-weight: 600; }

.main { display: flex; flex: 1; overflow: hidden; }

/* LEFT PANEL */
#leftPanel { width: 280px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

.panel-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.panel-section h3 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

textarea#coordInput { width: 100%; height: 100px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 6px 8px; border-radius: 4px; resize: none; }
textarea#coordInput::placeholder { color: var(--muted); }
textarea#coordInput:focus { outline: none; border-color: var(--accent); }

.btn { width: 100%; padding: 7px 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn:active { opacity: 0.7; }
.btn-accent { background: var(--accent); color: #000; }
.btn-green { background: var(--green); color: #000; }
.btn-orange { background: var(--orange); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-muted { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-purple { background: var(--purple); color: #fff; }
.btn + .btn { margin-top: 5px; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

#pointList { flex: 1; overflow-y: auto; padding: 4px 0; }
.point-item { padding: 5px 12px; font-size: 12px; font-family: var(--font-mono); display: flex; gap: 8px; align-items: center; cursor: pointer; }
.point-item:hover { background: var(--surface2); }
.point-item .pt-name { color: var(--accent); min-width: 40px; font-weight: 600; }
.point-item .pt-coords { color: var(--muted); font-size: 11px; }
.point-item.is-setup .pt-name { color: var(--green); }
.point-item.is-bs .pt-name { color: var(--orange); }

/* TRAVERSE LOG */
#traverseLog { max-height: 160px; overflow-y: auto; padding: 4px 0; }
.log-item { padding: 3px 12px; font-size: 11px; font-family: var(--font-mono); color: var(--muted); border-left: 2px solid transparent; }
.log-item.log-setup { color: var(--green); border-left-color: var(--green); }
.log-item.log-bs { color: var(--orange); border-left-color: var(--orange); }
.log-item.log-fs { color: var(--accent); border-left-color: var(--accent); }
.log-item.log-undo { color: var(--red); border-left-color: var(--red); }

/* CANVAS */
#canvasWrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
canvas#mapCanvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

/* MODE INDICATOR */
#modeIndicator { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.75); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; }
#modeIndicator .mode-step { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.mode-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.mode-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.mode-dot.done { background: var(--green); }

/* RIGHT action bar */
#actionBar { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
#actionBar button { padding: 8px 18px; border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
#actionBar button:hover { transform: translateY(-1px); }
#actionBar button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
#btnNextSetup { background: var(--orange); color: #000; }
#btnEnd { background: var(--green); color: #000; }
#btnUndo { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

/* tooltip */
#tooltip { position: absolute; background: rgba(0,0,0,0.85); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; font-family: var(--font-mono); pointer-events: none; display: none; color: var(--text); }
</style>
</head>
<body>

<header>
    <h1>&#9654; Traverse Recoverer</h1>
    <div id="statusBar">Paste coordinates and click Load Points to begin.</div>
</header>

<div class="main">
    <div id="leftPanel">
        <div class="panel-section">
            <h3>Coordinates</h3>
            <textarea id="coordInput" placeholder="Name,N,E or Name,N,E,Z,Desc&#10;1,5000,5000&#10;2,5100,5020&#10;3,5080,5150"></textarea>
            <input type="file" id="fileInput" accept=".csv,.txt,.rw5" style="display:none;">
            <button class="btn btn-accent" id="btnLoad" style="margin-top:6px;">Load Points</button>
            <button class="btn btn-muted" id="btnLoadFile" style="margin-top:5px;">&#128194; Load from File…</button>
        </div>

        <div class="panel-section">
            <h3>Points (<span id="ptCount">0</span>)</h3>
            <div id="pointList"></div>
        </div>

        <div class="panel-section">
            <h3>Traverse Log</h3>
            <div id="traverseLog"></div>
        </div>

        <div class="panel-section" style="margin-top:auto; border-top: 1px solid var(--border); border-bottom: none;">
            <button class="btn btn-purple" id="btnExport" disabled>Export RW5</button>
            <button class="btn btn-muted" id="btnClear" style="margin-top:5px;">Clear All</button>
        </div>
    </div>

    <div id="canvasWrap">
        <canvas id="mapCanvas"></canvas>

        <div id="modeIndicator">
            <div class="mode-step"><div class="mode-dot" id="dotSetup"></div><span style="font-size:11px;">Click Setup</span></div>
            <div class="mode-step"><div class="mode-dot" id="dotBS"></div><span style="font-size:11px;">Click Backsight</span></div>
            <div class="mode-step"><div class="mode-dot" id="dotFS"></div><span style="font-size:11px;">Click Foresight(s)</span></div>
        </div>

        <div id="actionBar">
            <button id="btnUndo" disabled>&#8592; Undo Last</button>
            <button id="btnNextSetup" disabled>Next Setup &#8594;</button>
            <button id="btnEnd" disabled>End Traverse</button>
        </div>

        <div id="tooltip"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const statusBar = document.getElementById('statusBar');
const pointList = document.getElementById('pointList');
const traverseLog = document.getElementById('traverseLog');
const tooltip = document.getElementById('tooltip');
const btnLoad = document.getElementById('btnLoad');
const btnLoadFile = document.getElementById('btnLoadFile');
const fileInput = document.getElementById('fileInput');
const btnExport = document.getElementById('btnExport');
const btnClear = document.getElementById('btnClear');
const btnNextSetup = document.getElementById('btnNextSetup');
const btnEnd = document.getElementById('btnEnd');
const btnUndo = document.getElementById('btnUndo');
const dotSetup = document.getElementById('dotSetup');
const dotBS = document.getElementById('dotBS');
const dotFS = document.getElementById('dotFS');
const ptCount = document.getElementById('ptCount');

let points = [];       // { name, n, e, desc }
let setups = [];       // { setup, bs, foresights: [] }
let currentSetup = null;
let currentBS = null;
let mode = 'idle';     // idle | setup | bs | fs
let pan = { x: 0, y: 0 };
let scale = 1;
let isDragging = false, dragStart = null;

// ── Resize canvas ──
function resizeCanvas() {
    const wrap = document.getElementById('canvasWrap');
    canvas.width = wrap.offsetWidth;
    canvas.height = wrap.offsetHeight;
    redraw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Load from File ──
btnLoadFile.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        document.getElementById('coordInput').value = ev.target.result;
        showStatus(`File loaded: <span>${file.name}</span> — click Load Points to continue.`);
    };
    reader.readAsText(file);
    fileInput.value = '';
});

// ── Load points ──
btnLoad.addEventListener('click', () => {
    const raw = document.getElementById('coordInput').value.trim();
    if (!raw) return;
    const parsed = [];
    raw.split('\n').forEach(line => {
        line = line.trim();
        if (!line) return;
        const parts = line.split(/[,\t]+/);
        if (parts.length < 3) return;
        const name = parts[0].trim();
        const n = parseFloat(parts[1]);
        const e = parseFloat(parts[2]);
        const desc = parts[4] ? parts[4].trim() : '';
        if (!name || isNaN(n) || isNaN(e)) return;
        parsed.push({ name, n, e, desc });
    });
    if (parsed.length === 0) { showStatus('No valid points found.', 'red'); return; }
    points = parsed;
    setups = [];
    currentSetup = null;
    currentBS = null;
    mode = 'setup';
    updatePointList();
    fitView();
    redraw();
    updateStatus();
    updateButtons();
    ptCount.textContent = points.length;
    btnExport.disabled = true;
    showStatus(`Loaded ${points.length} points. <span>Click the setup point.</span>`);
});

// ── Fit view ──
function fitView() {
    if (points.length === 0) return;
    const W = canvas.width, H = canvas.height;
    const pad = 60;
    const xs = points.map(p => p.e), ys = points.map(p => p.n);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
    scale = Math.min((W - pad*2) / rangeX, (H - pad*2) / rangeY);
    pan.x = W/2 - (minX + rangeX/2) * scale;
    pan.y = H/2 + (minY + rangeY/2) * scale;
}

// ── Coordinate transforms ──
const toCanvas = (e, n) => ({ cx: e * scale + pan.x, cy: -n * scale + pan.y });
const toWorld = (cx, cy) => ({ e: (cx - pan.x) / scale, n: -(cy - pan.y) / scale });

// ── Find nearest point to canvas click ──
function findNearest(cx, cy, excludeName) {
    let best = null, bestD = Infinity;
    points.forEach(p => {
        if (excludeName && p.name === excludeName) return;
        const { cx: px, cy: py } = toCanvas(p.e, p.n);
        const d = Math.hypot(cx - px, cy - py);
        if (d < 18 && d < bestD) { best = p; bestD = d; }
    });
    return best;
}

// ── Redraw ──
function redraw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1a1c1e';
    ctx.fillRect(0, 0, W, H);

    // Draw traverse lines
    setups.forEach(s => {
        if (!s.setup || !s.bs) return;
        const occ = toCanvas(s.setup.e, s.setup.n);
        const bs = toCanvas(s.bs.e, s.bs.n);
        // BS line (orange dashed)
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.moveTo(occ.cx, occ.cy);
        ctx.lineTo(bs.cx, bs.cy);
        ctx.strokeStyle = '#ffa726';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.setLineDash([]);
        // FS lines (solid cyan)
        s.foresights.forEach(fp => {
            const fs = toCanvas(fp.e, fp.n);
            ctx.beginPath();
            ctx.moveTo(occ.cx, occ.cy);
            ctx.lineTo(fs.cx, fs.cy);
            ctx.strokeStyle = '#4fc3f7';
            ctx.lineWidth = 2;
            ctx.stroke();
        });
    });

    // In-progress lines
    if (currentSetup && currentBS && currentSetup.e !== undefined && currentBS.e !== undefined) {
        const occ = toCanvas(currentSetup.e, currentSetup.n);
        const bs = toCanvas(currentBS.e, currentBS.n);
        ctx.beginPath();
        ctx.setLineDash([4,4]);
        ctx.moveTo(occ.cx, occ.cy);
        ctx.lineTo(bs.cx, bs.cy);
        ctx.strokeStyle = '#ffa726';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Draw points
    points.forEach(p => {
        const { cx, cy } = toCanvas(p.e, p.n);
        let color = '#8a9099';
        let r = 6;
        if (currentSetup && p.name === currentSetup.name) { color = '#66bb6a'; r = 8; }
        else if (currentBS && p.name === currentBS.name) { color = '#ffa726'; r = 8; }
        else if (setups.some(s => s.setup.name === p.name)) color = '#66bb6a';

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#1a1c1e';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = '#e8eaed';
        ctx.font = 'bold 11px Courier New';
        ctx.fillText(p.name, cx + 9, cy - 4);
    });
}

// ── Canvas click ──
canvas.addEventListener('click', e => {
    if (isDragging) return;
    if (mode === 'idle' || points.length === 0) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top) * scaleY;

    const pt = findNearest(cx, cy);
    if (!pt) return;

    if (mode === 'setup') {
        currentSetup = pt;
        currentBS = null;
        mode = 'bs';
        addLog(`Setup: ${pt.name}`, 'log-setup');
        updateStatus();
        updateModeIndicator();
        updatePointList();
        redraw();
    } else if (mode === 'bs') {
        if (!currentSetup || pt.name === currentSetup.name) return;
        currentBS = pt;
        mode = 'fs';
        addLog(`Backsight: ${pt.name}`, 'log-bs');
        updateStatus();
        updateModeIndicator();
        updatePointList();
        btnNextSetup.disabled = false;
        btnEnd.disabled = false;
        btnUndo.disabled = false;
        redraw();
    } else if (mode === 'fs') {
        if (!currentSetup || !currentBS || pt.name === currentSetup.name || pt.name === currentBS.name) return;
        // Add foresight to current setup group
        let grp = setups.find(s => s.setup.name === currentSetup.name && s.bs.name === currentBS.name && !s._closed);
        if (!grp) {
            grp = { setup: currentSetup, bs: currentBS, foresights: [], _closed: false };
            setups.push(grp);
        }
        grp.foresights.push(pt);
        addLog(`  Foresight: ${pt.name}`, 'log-fs');
        updateStatus();
        updatePointList();
        redraw();
    }
    updateButtons();
});

// ── Next Setup ──
btnNextSetup.addEventListener('click', () => {
    // Close current group
    const grp = setups.find(s => s.setup.name === currentSetup?.name && !s._closed);
    if (grp) grp._closed = true;
    else if (currentSetup && currentBS) {
        setups.push({ setup: currentSetup, bs: currentBS, foresights: [], _closed: true });
    }
    addLog('--- Next Setup ---', 'log-setup');
    currentSetup = null;
    currentBS = null;
    mode = 'setup';
    updateStatus();
    updateModeIndicator();
    updatePointList();
    btnNextSetup.disabled = true;
    btnEnd.disabled = true;
    redraw();
});

// ── End Traverse ──
btnEnd.addEventListener('click', () => {
    const grp = setups.find(s => s.setup.name === currentSetup?.name && !s._closed);
    if (grp) grp._closed = true;
    else if (currentSetup && currentBS) {
        setups.push({ setup: currentSetup, bs: currentBS, foresights: [], _closed: true });
    }
    mode = 'done';
    currentSetup = null;
    currentBS = null;
    addLog('=== Traverse Complete ===', 'log-setup');
    updateStatus();
    updateModeIndicator();
    updatePointList();
    btnNextSetup.disabled = true;
    btnEnd.disabled = true;
    btnExport.disabled = setups.length === 0;
    redraw();
    showStatus(`Traverse complete — ${setups.length} setup(s). <span>Click Export RW5 to download.</span>`);
});

// ── Undo Last ──
btnUndo.addEventListener('click', () => {
    if (mode === 'fs') {
        // Remove last foresight, or if none, go back to bs mode
        const grp = setups.find(s => s.setup.name === currentSetup?.name && !s._closed);
        if (grp && grp.foresights.length > 0) {
            const removed = grp.foresights.pop();
            if (grp.foresights.length === 0) setups.splice(setups.indexOf(grp), 1);
            addLog(`Undo: removed FS ${removed.name}`, 'log-undo');
        } else {
            // Undo back to setup mode (remove bs)
            currentBS = null;
            mode = 'bs';
            addLog('Undo: removed backsight', 'log-undo');
            btnNextSetup.disabled = true;
            btnEnd.disabled = true;
        }
    } else if (mode === 'bs') {
        // Undo the setup selection
        addLog(`Undo: removed setup ${currentSetup.name}`, 'log-undo');
        currentSetup = null;
        mode = 'setup';
        btnUndo.disabled = true;
    }
    updateStatus();
    updateModeIndicator();
    updatePointList();
    redraw();
});

// ── Pan & zoom ──
let lastMouse = null;
canvas.addEventListener('mousedown', e => { isDragging = false; dragStart = { x: e.clientX, y: e.clientY }; lastMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mousemove', e => {
    if (lastMouse && dragStart && (Math.abs(e.clientX - dragStart.x) > 3 || Math.abs(e.clientY - dragStart.y) > 3)) {
        isDragging = true;
        pan.x += e.clientX - lastMouse.x;
        pan.y += e.clientY - lastMouse.y;
        redraw();
    }
    lastMouse = { x: e.clientX, y: e.clientY };
    // Tooltip
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top) * scaleY;
    const pt = findNearest(cx, cy);
    if (pt) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
        tooltip.style.top = (e.clientY - rect.top - 8) + 'px';
        tooltip.textContent = `${pt.name}  N:${pt.n.toFixed(4)}  E:${pt.e.toFixed(4)}${pt.desc ? '  ' + pt.desc : ''}`;
    } else {
        tooltip.style.display = 'none';
    }
});
canvas.addEventListener('mouseup', () => { lastMouse = null; dragStart = null; });
canvas.addEventListener('mouseleave', () => { lastMouse = null; dragStart = null; tooltip.style.display = 'none'; });
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
    const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
    pan.x = cx - (cx - pan.x) * factor;
    pan.y = cy - (cy - pan.y) * factor;
    scale *= factor;
    redraw();
}, { passive: false });

// ── Update helpers ──
function updatePointList() {
    pointList.innerHTML = '';
    points.forEach(p => {
        const div = document.createElement('div');
        div.className = 'point-item';
        if (currentSetup && p.name === currentSetup.name) div.classList.add('is-setup');
        else if (currentBS && p.name === currentBS.name) div.classList.add('is-bs');
        div.innerHTML = `<span class="pt-name">${p.name}</span><span class="pt-coords">N:${p.n.toFixed(3)} E:${p.e.toFixed(3)}</span>`;
        pointList.appendChild(div);
    });
}

function addLog(msg, cls) {
    const div = document.createElement('div');
    div.className = `log-item ${cls}`;
    div.textContent = msg;
    traverseLog.appendChild(div);
    traverseLog.scrollTop = traverseLog.scrollHeight;
}

function updateStatus() {
    const msgs = {
        idle: 'Load points to begin.',
        setup: '<span>Click the setup point.</span>',
        bs: `Setup: <span>${currentSetup?.name}</span> — Click the backsight point.`,
        fs: `Setup: <span>${currentSetup?.name}</span>  BS: <span>${currentBS?.name}</span> — Click foresight(s) or Next Setup.`,
        done: `Traverse complete — <span>${setups.length} setup(s)</span>. Click Export RW5.`
    };
    statusBar.innerHTML = msgs[mode] || '';
}

function updateModeIndicator() {
    dotSetup.className = 'mode-dot' + (mode === 'setup' ? ' active' : (currentSetup ? ' done' : ''));
    dotBS.className = 'mode-dot' + (mode === 'bs' ? ' active' : (currentBS ? ' done' : ''));
    dotFS.className = 'mode-dot' + (mode === 'fs' ? ' active' : '');
}

function updateButtons() {
    btnUndo.disabled = (mode === 'idle' || mode === 'setup' || mode === 'done');
    btnNextSetup.disabled = mode !== 'fs';
    btnEnd.disabled = mode !== 'fs';
}

function showStatus(msg) { statusBar.innerHTML = msg; }

// ── DMS helpers ──
function decimalToDMS(deg) {
    // Returns DDD.MMSS format
    const d = Math.floor(Math.abs(deg));
    const mf = (Math.abs(deg) - d) * 60;
    const m = Math.floor(mf);
    const s = Math.round((mf - m) * 60 * 10000) / 10000;
    const ss = s.toFixed(4).padStart(7, '0');
    return (deg < 0 ? -1 : 1) * parseFloat(`${d}.${String(m).padStart(2,'0')}${ss}`);
}

function azimuth(from, to) {
    // True azimuth from north, degrees
    const dE = to.e - from.e;
    const dN = to.n - from.n;
    let az = Math.atan2(dE, dN) * 180 / Math.PI;
    if (az < 0) az += 360;
    return az;
}

function distance(from, to) {
    return Math.hypot(to.e - from.e, to.n - from.n);
}

function angleRight(setupPt, bsPt, fsPt) {
    // Angle right from backsight to foresight
    const azBS = azimuth(setupPt, bsPt);
    const azFS = azimuth(setupPt, fsPt);
    let ar = azFS - azBS;
    if (ar < 0) ar += 360;
    return ar;
}

// ── Export RW5 ──
btnExport.addEventListener('click', () => {
    if (setups.length === 0) return;

    const lines = [];
    const now = new Date();
    const dateStr = `${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}-${now.getFullYear()}`;
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

    lines.push(`JB,NMTraverse Builder Export,DT${dateStr},TM${timeStr}`);
    lines.push(`MO,AD0,UN2,SF1.00000000,EC0,EO0.0,AU0`);
    lines.push(`-- Traverse Builder — ESE LLC`);
    lines.push(`-- Generated from manually entered coordinates`);
    lines.push(``);

    // SP records for all points
    points.forEach(p => {
        const desc = p.desc ? `,--${p.desc}` : '';
        lines.push(`SP,PN${p.name},N ${p.n.toFixed(4)},E ${p.e.toFixed(4)},EL0.0000${desc}`);
    });
    lines.push(``);

    // OC/BK/SS records for each setup
    setups.forEach(s => {
        const occ = s.setup;
        const bs = s.bs;
        const bsAz = azimuth(occ, bs);
        const bsDMS = decimalToDMS(bsAz).toFixed(4);
        const bsDist = distance(occ, bs).toFixed(3);

        lines.push(`OC,OP${occ.name},N ${occ.n.toFixed(4)},E ${occ.e.toFixed(4)},EL0.0000`);
        lines.push(`LS,HI0.0000,HR0.0000`);
        lines.push(`BK,OP${occ.name},BP${bs.name},BS${bsDMS},BC0.0000`);
        lines.push(`BD,OP${occ.name},FP${bs.name},AR0.0000,ZE90.0000,SD${bsDist},--BS`);

        s.foresights.forEach(fp => {
            const ar = angleRight(occ, bs, fp);
            const arDMS = decimalToDMS(ar).toFixed(4);
            const sd = distance(occ, fp).toFixed(3);
            const desc = fp.desc ? `,--${fp.desc}` : `,--`;
            lines.push(`SS,OP${occ.name},FP${fp.name},AR${arDMS},ZE90.0000,SD${sd}${desc}`);
        });
        lines.push(``);
    });

    const content = lines.join('\r\n');
    const blob = new Blob([content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `traverse-recoverer-${dateStr}.rw5`;
    a.click();
    URL.revokeObjectURL(a.href);
});

// ── Clear All ──
btnClear.addEventListener('click', () => {
    points = []; setups = []; currentSetup = null; currentBS = null; mode = 'idle';
    document.getElementById('coordInput').value = '';
    pointList.innerHTML = '';
    traverseLog.innerHTML = '';
    ptCount.textContent = '0';
    btnExport.disabled = true;
    updateButtons();
    updateModeIndicator();
    showStatus('Paste coordinates and click Load Points to begin.');
    redraw();
});

updateModeIndicator();
</script>
